# Base service definitions, shared between dev and (future) prod. Dev specifics — source
# bind-mounts and host port exposure — live in compose.override.yaml (auto-merged by
# `docker compose`). See DEVELOPMENT.md.
name: panvitium

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-panvitium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panvitium}
      POSTGRES_DB: ${POSTGRES_DB:-panvitium}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-panvitium} -d ${POSTGRES_DB:-panvitium}']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # One-shot: applies Drizzle migrations, then exits. `api` waits for it to complete successfully
  # (rather than running migrations in the app's CMD, which would race across replicas).
  migrate:
    build:
      context: .
      target: dev
    command: pnpm -C apps/api db:migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://panvitium:panvitium@postgres:5432/panvitium}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      target: dev
    command: pnpm -C apps/api dev
    environment:
      HOST: 0.0.0.0
      PORT: '3000'
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgres://panvitium:panvitium@postgres:5432/panvitium}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:5173}
      COOKIE_SECRET: ${COOKIE_SECRET:-dev-insecure-cookie-secret-change-me}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:-dev-insecure-magic-secret-change-me}
      SAVE_SIGNING_SECRET: ${SAVE_SIGNING_SECRET:-dev-insecure-save-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      target: dev
    command: pnpm -C apps/web dev --host 0.0.0.0
    environment:
      NODE_ENV: development
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
