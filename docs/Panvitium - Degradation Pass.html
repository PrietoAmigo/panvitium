<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panvitium — The Degradation Pass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital@0;1&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Ubuntu:wght@400;500;700&family=Ubuntu+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="panvitium-menus.css" />
    <style>
      /* The canvas IS the scene. Nearest-neighbour CSS upscale keeps the blocks
         crisp at any stage size; the engine renders 1280x720 internally. */
      .scene-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .stage {
        background: #050403;
      }
      /* The shipped fade-in uses opacity:0 + fill-mode both, which leaves the HUD
         and stage invisible if CSS animations are paused (backgrounded tab). Keep
         them visible by default; the atmosphere comes from the live canvas pass. */
      .hud,
      .stage {
        animation: none !important;
        opacity: 1 !important;
      }
      /* keep the inset frame shadow above the canvas for a seated-in-the-cabinet feel */
      .stage::after {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow: inset 0 0 200px 36px rgba(0, 0, 0, 0.7);
        z-index: 2;
      }
      .hotspot,
      .room-name {
        z-index: 5;
      }
      /* a faint always-on hint that the scene is clickable */
      .stage:hover .hotspot {
        border-color: rgba(216, 182, 88, 0.14);
      }
    </style>
  </head>
  <body>

          <rect x="50" y="40" width="10" height="10" fill="#7c1417" />
          <rect x="40" y="50" width="10" height="10" fill="#e9dab6" />
          <rect x="60" y="40" width="10" height="10" fill="#7c1417" />
